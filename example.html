<div class="quick-edit-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Quick Edit</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div style="margin-bottom: 10px;">
                <input id="quick_edit_enabled" type="checkbox" />
                <label for="quick_edit_enabled">Enable Quick Edit</label>
            </div>
            <p><small>Select text in chat to get quick edit/delete buttons.</small></p>
            <p><small>Cancel, save, and delete now keep focus stable on mobile. Deleted text can be undone for a short window with Ctrl/Cmd + Z.</small></p>
            <p><small>Toggle this and refresh - it should remember your choice.</small></p>
        </div>
    </div>
</div>
